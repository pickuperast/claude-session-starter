name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  SERVER_USER: ${{ secrets.SERVER_USER || 'ubuntu' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH key and known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' '${{ secrets.SSH_PRIVATE_KEY }}' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=no ${{ env.SERVER_USER }}@${{ secrets.SERVER_IP }} "echo 'SSH connection successful'"

      - name: Deploy to server
        env:
          GHA_SERVER_IP: ${{ secrets.SERVER_IP }}
          GHA_GH_TOKEN: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          GHA_PING_PROVIDER_CODEX: ${{ secrets.PING_PROVIDER_CODEX }}
          GHA_PING_PROVIDER_CLAUDE: ${{ secrets.PING_PROVIDER_CLAUDE }}
          GHA_CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GHA_MODEL: ${{ secrets.MODEL }}
          GHA_CODEX_HOME: ${{ secrets.CODEX_HOME }}
          GHA_ACCOUNT_STORAGE_PATH: ${{ secrets.ACCOUNT_STORAGE_PATH }}
          GHA_CODEX_MODEL: ${{ secrets.CODEX_MODEL }}
          GHA_CODEX_ACCOUNT_SELECTION: ${{ secrets.CODEX_ACCOUNT_SELECTION }}
          GHA_CODEX_ENABLE_AUTO_FALLBACK: ${{ secrets.CODEX_ENABLE_AUTO_FALLBACK }}
          GHA_CODEX_FAILURE_COOLDOWN_MINUTES: ${{ secrets.CODEX_FAILURE_COOLDOWN_MINUTES }}
          GHA_SCHEDULER_LOG_PATH: ${{ secrets.SCHEDULER_LOG_PATH }}
          GHA_SCHEDULE_TIMES: ${{ secrets.SCHEDULE_TIMES }}
          GHA_TIMEZONE: ${{ secrets.TIMEZONE }}
          GHA_MESSAGE_PROMPT: ${{ secrets.MESSAGE_PROMPT }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ env.SERVER_USER }}@$GHA_SERVER_IP \
            "export REPO_URL='https://github.com/${{ github.repository }}.git' && \
             export BRANCH_NAME='${{ github.ref_name }}' && \
             export GH_TOKEN='$GHA_GH_TOKEN' && \
             export PING_PROVIDER_CODEX='$GHA_PING_PROVIDER_CODEX' && \
             export PING_PROVIDER_CLAUDE='$GHA_PING_PROVIDER_CLAUDE' && \
             export CLAUDE_CODE_OAUTH_TOKEN='$GHA_CLAUDE_CODE_OAUTH_TOKEN' && \
             export MODEL='$GHA_MODEL' && \
             export CODEX_HOME='$GHA_CODEX_HOME' && \
             export ACCOUNT_STORAGE_PATH='$GHA_ACCOUNT_STORAGE_PATH' && \
             export CODEX_MODEL='$GHA_CODEX_MODEL' && \
             export CODEX_ACCOUNT_SELECTION='$GHA_CODEX_ACCOUNT_SELECTION' && \
             export CODEX_ENABLE_AUTO_FALLBACK='$GHA_CODEX_ENABLE_AUTO_FALLBACK' && \
             export CODEX_FAILURE_COOLDOWN_MINUTES='$GHA_CODEX_FAILURE_COOLDOWN_MINUTES' && \
             export SCHEDULER_LOG_PATH='$GHA_SCHEDULER_LOG_PATH' && \
             export SCHEDULE_TIMES='$GHA_SCHEDULE_TIMES' && \
             export TIMEZONE='$GHA_TIMEZONE' && \
             export MESSAGE_PROMPT='$GHA_MESSAGE_PROMPT' && \
             bash -s" << 'DEPLOY_SCRIPT'
          set -euo pipefail

          PROJECT_DIR="/var/www/${{ github.event.repository.name }}"

          echo "Starting deployment for ${{ github.repository }}..."
          echo "Project directory: $PROJECT_DIR"

          if [ -d "$PROJECT_DIR/.git" ]; then
            echo "Project directory exists. Updating repository..."
            cd "$PROJECT_DIR"

            if ! git diff --quiet || ! git diff --cached --quiet || [ -n "$(git ls-files --others --exclude-standard)" ]; then
              echo "Found uncommitted/untracked changes outside state/. Stashing them..."
              git add -A 2>/dev/null || true
              git stash push -u -m "Auto-stash before deployment $(date)" 2>/dev/null || {
                echo "Stash failed, performing hard reset..."
                git reset --hard HEAD 2>/dev/null || true
                git clean -fd -e state/ 2>/dev/null || true
              }
            fi

            echo "Pulling latest changes from origin/$BRANCH_NAME..."
            git fetch origin "$BRANCH_NAME" || git fetch origin
            git checkout "$BRANCH_NAME" 2>/dev/null || echo "Using current branch"
            git reset --hard "origin/$BRANCH_NAME" 2>/dev/null || git reset --hard HEAD
            git clean -fd -e state/
          else
            echo "Project directory does not exist. Cloning repository..."
            sudo mkdir -p "$(dirname "$PROJECT_DIR")"
            sudo chown $USER:$USER "$(dirname "$PROJECT_DIR")"
            rm -rf "$PROJECT_DIR"

            if [ -n "${GH_TOKEN:-}" ]; then
              REPO_PATH="${REPO_URL#https://github.com/}"
              AUTHENTICATED_URL="https://${GH_TOKEN}@github.com/${REPO_PATH}"
            else
              AUTHENTICATED_URL="$REPO_URL"
            fi

            git clone --depth 1 --branch "$BRANCH_NAME" "$AUTHENTICATED_URL" "$PROJECT_DIR" || {
              echo "Branch-specific clone failed, trying default branch..."
              git clone --depth 1 "$AUTHENTICATED_URL" "$PROJECT_DIR"
              cd "$PROJECT_DIR"
              git checkout "$BRANCH_NAME" 2>/dev/null || echo "Using default branch"
            }

            cd "$PROJECT_DIR"
          fi

          mkdir -p state/accounts state/codex-home state/logs

          echo "Verifying docker-compose.yml exists..."
          if [ ! -f "docker-compose.yml" ]; then
            echo "ERROR: docker-compose.yml not found in $(pwd)"
            ls -la
            exit 1
          fi

          if [ "${PING_PROVIDER_CODEX:-true}" = "true" ] && [ ! -f "state/accounts/codex-accounts.json" ]; then
            echo "WARNING: state/accounts/codex-accounts.json is missing."
            echo "Skipping container deployment until manual Codex bootstrap is completed on the server."
            echo "Bootstrap steps:"
            echo "  cd $PROJECT_DIR"
            echo "  cp .env.example .env"
            echo "  npm install"
            echo "  npm run codex:accounts -- login --label main"
            echo "  docker compose up -d --build"
            exit 0
          fi

          echo "Writing deployment environment file..."
          {
            echo "PING_PROVIDER_CODEX=${PING_PROVIDER_CODEX:-true}"
            echo "PING_PROVIDER_CLAUDE=${PING_PROVIDER_CLAUDE:-false}"
            echo "CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}"
            echo "MODEL=${MODEL:-claude-haiku-4-5-20251001}"
            echo "CODEX_HOME=${CODEX_HOME:-/app/state/codex-home}"
            echo "ACCOUNT_STORAGE_PATH=${ACCOUNT_STORAGE_PATH:-/app/state/accounts/codex-accounts.json}"
            echo "CODEX_MODEL=${CODEX_MODEL:-gpt-5.4-mini}"
            echo "CODEX_ACCOUNT_SELECTION=${CODEX_ACCOUNT_SELECTION:-all}"
            echo "CODEX_ENABLE_AUTO_FALLBACK=${CODEX_ENABLE_AUTO_FALLBACK:-true}"
            echo "CODEX_FAILURE_COOLDOWN_MINUTES=${CODEX_FAILURE_COOLDOWN_MINUTES:-60}"
            echo "SCHEDULER_LOG_PATH=${SCHEDULER_LOG_PATH:-/app/state/logs/scheduler.log}"
            echo "SCHEDULE_TIMES=${SCHEDULE_TIMES:-07:01}"
            echo "TIMEZONE=${TIMEZONE:-Etc/GMT-5}"
            echo "MESSAGE_PROMPT=${MESSAGE_PROMPT:-}"
          } > .env
          chmod 600 .env

          if docker compose version >/dev/null 2>&1; then
            DC=(docker compose)
          elif command -v docker-compose >/dev/null 2>&1; then
            DC=(docker-compose)
          else
            echo "ERROR: docker compose is not installed on server."
            exit 1
          fi

          echo "Stopping existing services..."
          "${DC[@]}" down --remove-orphans 2>/dev/null || true

          echo "Building and starting services with docker compose..."
          "${DC[@]}" up -d --build --force-recreate

          echo "Cleaning up old Docker images..."
          docker image prune -f

          echo "Deployment completed successfully."
          echo "Current running containers:"
          "${DC[@]}" ps

          echo "Waiting 10 seconds for container to start..."
          sleep 10

          echo "Container logs:"
          "${DC[@]}" logs --tail 50 scheduler || true
          DEPLOY_SCRIPT
